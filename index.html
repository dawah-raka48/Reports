<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>نظام التقارير الأسبوعية</title>

    <meta name="description" content="Weekly Reports System">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

    <!-- Background -->

    <div class="background">

        <span class="circle circle-1"></span>
        <span class="circle circle-2"></span>
        <span class="circle circle-3"></span>

    </div>

    <!-- Login -->

    <main id="loginContainer" class="login-container">

        <!-- Logo -->

        <section class="login-header">

            <img
                src="assets/images/logo.png"
                alt="Logo"
                id="logo"
                class="logo">

            <h1 class="system-title">

                نظام التقارير الأسبوعية

            </h1>

            <p class="system-subtitle">

                Weekly Reports System

            </p>

        </section>

        <!-- Card -->

        <section class="login-card">

            <form id="loginForm">

                <!-- Username -->

                <div class="input-group">

                    <label>

                        اسم المستخدم

                    </label>

                    <div class="input-box">

                        <i class="fa-solid fa-user"></i>

                        <input
                            id="username"
                            type="text"
                            autocomplete="username"
                            required>

                    </div>

                </div>

                <!-- Password -->

                <div class="input-group">

                    <label>

                        كلمة المرور

                    </label>

                    <div class="input-box">

                        <i class="fa-solid fa-lock"></i>

                        <input
                            id="password"
                            type="password"
                            autocomplete="current-password"
                            required>

                    </div>

                </div>

                <!-- Remember -->

                <div class="remember-row">

                    <label class="remember">

                        <input
                            id="rememberMe"
                            type="checkbox">

                        <span>

                            تذكرني

                        </span>

                    </label>

                </div>

                <!-- Button -->

                <button
                    id="loginBtn"
                    class="login-btn"
                    type="submit">

                    <i class="fa-solid fa-right-to-bracket"></i>

                    تسجيل الدخول

                </button>

            </form>

        </section>

        <!-- Theme -->

        <button
            id="themeToggle"
            class="theme-toggle"
            type="button">

            <i class="fa-solid fa-moon"></i>

        </button>

        <!-- Footer -->

        <footer class="footer">

            <span>

                الإصدار 1.0.0

            </span>

            <small>

                © جمعية الدعوة والإرشاد وتوعية الجاليات بالراكة

            </small>

        </footer>

    </main>

    <!-- JS -->

    <script src="assets/js/core/app.js"></script>

    <script src="assets/js/core/auth.js"></script>

    <script src="assets/js/modules/theme.js"></script>

    <script src="assets/js/pages/login.js"></script>

</body>

</html>
