<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>لوحة المدير</title>

    <!-- Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Icons -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Global CSS -->

    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/reset.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/animations.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">
    <link rel="stylesheet" href="../../assets/css/style.css">

    <!-- Dashboard -->

    <link rel="stylesheet"
          href="../../assets/css/admin-dashboard.css">

</head>

<body>

<div class="dashboard-wrapper">

    <!-- Header -->

    <header class="dashboard-header">

        <div class="header-left">

            <img
                src="../../assets/images/logo.png"
                class="header-logo"
                alt="Logo">

            <div class="header-title">

                <h2>لوحة المدير</h2>

                <span>Weekly Reports System</span>

            </div>

        </div>

        <div class="header-right">

            <div class="clock-box">

                <i class="fa-regular fa-clock"></i>

                <span id="clock">

                    --:--:--

                </span>

            </div>

            <button
                id="themeToggle"
                class="header-btn">

                <i class="fa-solid fa-moon"></i>

            </button>

            <button
                id="logoutBtn"
                class="header-btn danger">

                <i class="fa-solid fa-right-from-bracket"></i>

            </button>

        </div>

    </header>

    <!-- Main -->

    <main class="dashboard">

        <!-- Welcome -->

        <section class="welcome-card">

            <div class="welcome-content">

                <span class="welcome-text">

                    السلام عليكم 👋

                </span>

                <h1 id="adminName">

                    ...

                </h1>

                <p>

                    مرحباً بك في لوحة تحكم نظام التقارير الأسبوعية.

                </p>

            </div>

        </section>

        <!-- Menu -->

        <section class="cards">

            <button
                class="menu-card"
                id="employeesBtn">

                <div class="card-icon">

                    <i class="fa-solid fa-users"></i>

                </div>

                <h3>

                    الموظفون

                </h3>

                <p>

                    إدارة جميع الموظفين

                </p>

            </button>

            <button
                class="menu-card"
                id="departmentsBtn">

                <div class="card-icon">

                    <i class="fa-solid fa-building"></i>

                </div>

                <h3>

                    الأقسام

                </h3>

                <p>

                    إدارة أقسام الجمعية

                </p>

            </button>

            <button
                class="menu-card"
                id="reportsBtn">

                <div class="card-icon">

                    <i class="fa-solid fa-file-lines"></i>

                </div>

                <h3>

                    التقارير

                </h3>

                <p>

                    متابعة التقارير الأسبوعية

                </p>

            </button>

            <button
                class="menu-card"
                id="settingsBtn">

                <div class="card-icon">

                    <i class="fa-solid fa-gear"></i>

                </div>

                <h3>

                    الإعدادات

                </h3>

                <p>

                    إعدادات النظام

                </p>

            </button>

        </section>

        <!-- Statistics -->

        <section class="statistics">

            <div class="stat-card">

                <span>

                    عدد الموظفين

                </span>

                <h2 id="employeesCount">

                    0

                </h2>

            </div>

            <div class="stat-card">

                <span>

                    عدد الأقسام

                </span>

                <h2 id="departmentsCount">

                    0

                </h2>

            </div>

            <div class="stat-card">

                <span>

                    تقارير هذا الأسبوع

                </span>

                <h2 id="reportsCount">

                    0

                </h2>

            </div>

            <div class="stat-card">

                <span>

                    المتأخرون

                </span>

                <h2 id="lateCount">

                    0

                </h2>

            </div>

        </section>

    </main>

</div>

<!-- Scripts -->

<script src="../../config/config.js"></script>

<script src="../../assets/js/core/api.js"></script>

<script src="../../assets/js/core/app.js"></script>

<script src="../../assets/js/core/auth.js"></script>

<script src="../../assets/js/modules/theme.js"></script>

<script src="../../assets/js/pages/admin-dashboard.js"></script>

</body>

</html>
