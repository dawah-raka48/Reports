<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>موظفو القسم</title>

    <!-- Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Icons -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Global CSS -->

    <link rel="stylesheet"
          href="../../assets/css/variables.css">

    <link rel="stylesheet"
          href="../../assets/css/reset.css">

    <link rel="stylesheet"
          href="../../assets/css/layout.css">

    <link rel="stylesheet"
          href="../../assets/css/components.css">

    <link rel="stylesheet"
          href="../../assets/css/animations.css">

    <link rel="stylesheet"
          href="../../assets/css/responsive.css">

    <link rel="stylesheet"
          href="../../assets/css/style.css">

    <!-- Page CSS -->

    <link rel="stylesheet"
          href="../../assets/css/manager-employees.css">

</head>

<body>

<div class="dashboard-wrapper">

    <!-- Header -->

    <header class="dashboard-header">

        <div class="header-left">

            <img
                src="../../assets/images/logo.png"
                class="header-logo"
                alt="Logo">

            <div class="header-title">

                <h2>

                    موظفو القسم

                </h2>

                <span>

                    Weekly Reports System

                </span>

            </div>

        </div>

        <div class="header-right">

            <div class="clock-box">

                <i class="fa-regular fa-clock"></i>

                <span id="clock">

                    --:--:--

                </span>

            </div>

            <button
                id="themeToggle"
                class="header-btn">

                <i class="fa-solid fa-moon"></i>

            </button>

            <button
                id="logoutBtn"
                class="header-btn danger">

                <i class="fa-solid fa-right-from-bracket"></i>

            </button>

        </div>

    </header>

    <main class="dashboard">

        <!-- Department -->

        <section class="welcome-card">

            <span class="welcome-text">

                قسم

            </span>

            <h1 id="departmentName">

                ...

            </h1>

            <p>

                قائمة جميع موظفي القسم

            </p>

        </section>

        <!-- Statistics -->

        <section class="statistics">

            <div class="stat-card">

                <span>

                    إجمالي الموظفين

                </span>

                <h2 id="employeesCount">

                    0

                </h2>

            </div>

            <div class="stat-card">

                <span>

                    رفعوا التقرير

                </span>

                <h2 id="submittedCount">

                    0

                </h2>

            </div>

            <div class="stat-card">

                <span>

                    لم يرفعوا

                </span>

                <h2 id="missingCount">

                    0

                </h2>

            </div>

        </section>

        <!-- Employees -->

        <section class="employees-list">

            <div
                id="employeesContainer">

            </div>

        </section>

    </main>

</div>

<script src="../../config/config.js"></script>

<script src="../../assets/js/core/api.js"></script>

<script src="../../assets/js/core/app.js"></script>

<script src="../../assets/js/core/auth.js"></script>

<script src="../../assets/js/modules/theme.js"></script>

<script src="../../assets/js/pages/manager-employees.js"></script>

</body>

</html>
