<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>تقارير القسم</title>

    <!-- Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Icons -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Global CSS -->

    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/reset.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/animations.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">
    <link rel="stylesheet" href="../../assets/css/style.css">

    <!-- Page CSS -->

    <link rel="stylesheet"
          href="../../assets/css/manager-dashboard.css">

</head>

<body>

<div class="dashboard-wrapper">

    <!-- Header -->

    <header class="dashboard-header">

        <div class="header-left">

            <img
                src="../../assets/images/logo.png"
                class="header-logo"
                alt="Logo">

            <div class="header-title">

                <h2>

                    تقارير القسم

                </h2>

                <span>

                    Weekly Reports System

                </span>

            </div>

        </div>

        <div class="header-right">

            <div class="clock-box">

                <i class="fa-regular fa-clock"></i>

                <span id="clock">

                    --:--:--

                </span>

            </div>

            <button
                id="themeToggle"
                class="header-btn">

                <i class="fa-solid fa-moon"></i>

            </button>

            <button
                id="logoutBtn"
                class="header-btn danger">

                <i class="fa-solid fa-right-from-bracket"></i>

            </button>

        </div>

    </header>

    <!-- Welcome -->

<section class="welcome-card">

    <span class="welcome-text">

        قسم

    </span>

    <h1 id="departmentName">

        ...

    </h1>

    <p>

        متابعة تقارير موظفي القسم

    </p>

</section>

<!-- Statistics -->

<section class="statistics">

    <div class="stat-card">

        <span>

            إجمالي التقارير

        </span>

        <h2 id="reportsCount">

            0

        </h2>

    </div>

    <div class="stat-card">

        <span>

            بانتظار المراجعة

        </span>

        <h2 id="pendingCount">

            0

        </h2>

    </div>

    <div class="stat-card">

        <span>

            تم اعتمادها

        </span>

        <h2 id="approvedCount">

            0

        </h2>

    </div>

</section>

<!-- Filters -->

<section class="filters">

    <input
        type="text"
        id="searchInput"
        placeholder="بحث باسم الموظف">

    <select id="weekFilter">

        <option value="">

            جميع الأسابيع

        </option>

    </select>

    <select id="statusFilter">

        <option value="">

            جميع الحالات

        </option>

        <option value="Pending">

            بانتظار المراجعة

        </option>

        <option value="Approved">

            تم الاعتماد

        </option>

        <option value="Rejected">

            مرفوض

        </option>

    </select>

</section>

<!-- Reports -->

<section class="page-content">

    <div
        id="reportsContainer"
        class="list-container">

    </div>

</section>

                متابعة تقارير موظفي القسم

            </p>

        </section>
<!-- Statistics -->

<section class="statistics">

    <div class="stat-card">

        <span>

            إجمالي التقارير

        </span>

        <h2 id="totalReports">

            0

        </h2>

    </div>

    <div class="stat-card">

        <span>

            بانتظار المراجعة

        </span>

        <h2 id="pendingReports">

            0

        </h2>

    </div>

    <div class="stat-card">

        <span>

            تم اعتمادها

        </span>

        <h2 id="approvedReports">

            0

        </h2>

    </div>

</section>

<!-- Reports -->

<section class="reports-section">

    <div
        id="reportsContainer"
        class="reports-grid">

        <div class="empty-card">

            <i class="fa-solid fa-folder-open"></i>

            <h3>

                لا توجد تقارير

            </h3>

            <p>

                سيتم عرض تقارير موظفي القسم هنا.

            </p>

        </div>

    </div>

</section>
</main>

</div>

<script src="../../config/config.js"></script>

<script src="../../assets/js/core/api.js"></script>

<script src="../../assets/js/core/app.js"></script>

<script src="../../assets/js/core/auth.js"></script>

<script src="../../assets/js/modules/theme.js"></script>

<script src="../../assets/js/pages/manager-reports.js"></script>

</body>

</html>
